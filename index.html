<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>사주명리원 — 운명의 별자리</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97e;
      --gold-dark: #9a7a30;
      --bg: #06060f;
      --bg2: #0d0d1e;
      --bg3: #12122a;
      --text: #e8e0cc;
      --text-dim: #8a7e6e;
      --red: #c94c4c;
      --blue: #4c7ac9;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Stars */
    #stars-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }

    /* ── Hero ── */
    .hero {
      text-align: center;
      padding: 80px 0 60px;
    }

    .hero-emblem {
      width: 90px;
      height: 90px;
      margin: 0 auto 32px;
      border: 2px solid var(--gold-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      background: radial-gradient(circle, #1a1a35, #06060f);
      box-shadow: 0 0 40px rgba(201,168,76,0.15), inset 0 0 20px rgba(201,168,76,0.05);
      animation: pulse-glow 4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 40px rgba(201,168,76,0.15), inset 0 0 20px rgba(201,168,76,0.05); }
      50% { box-shadow: 0 0 60px rgba(201,168,76,0.35), inset 0 0 30px rgba(201,168,76,0.12); }
    }

    .hero-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(24px, 5vw, 38px);
      letter-spacing: 0.12em;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
    }

    .hero-sub {
      font-size: 13px;
      letter-spacing: 0.3em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .hero-desc {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 2;
      max-width: 460px;
      margin: 16px auto 0;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 40px 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dark));
    }
    .divider::after {
      background: linear-gradient(to left, transparent, var(--gold-dark));
    }
    .divider-icon { color: var(--gold); font-size: 18px; }

    /* ── Form ── */
    .form-card {
      background: linear-gradient(145deg, #0f0f24, #0a0a18);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(201,168,76,0.1);
    }

    .form-title {
      font-size: 13px;
      letter-spacing: 0.3em;
      color: var(--gold);
      text-align: center;
      margin-bottom: 32px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group.full { grid-column: 1 / -1; }

    label {
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    input, select {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Noto Serif KR', serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
      width: 100%;
    }

    input:focus, select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    select option { background: #12122a; }

    .gender-group {
      display: flex;
      gap: 12px;
    }

    .gender-btn {
      flex: 1;
      padding: 12px;
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
      cursor: pointer;
      font-family: 'Noto Serif KR', serif;
      font-size: 14px;
      letter-spacing: 0.1em;
      transition: all 0.3s;
      text-align: center;
    }

    .gender-btn.active {
      border-color: var(--gold);
      background: rgba(201,168,76,0.1);
      color: var(--gold-light);
      box-shadow: 0 0 15px rgba(201,168,76,0.1);
    }

    .submit-btn {
      width: 100%;
      margin-top: 28px;
      padding: 16px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
      background-size: 200% 100%;
      border: none;
      border-radius: 10px;
      color: #06060f;
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.25em;
      cursor: pointer;
      transition: all 0.4s;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }

    .submit-btn:hover::before { left: 100%; }
    .submit-btn:hover {
      background-position: 100% 0;
      box-shadow: 0 0 30px rgba(201,168,76,0.4);
      transform: translateY(-1px);
    }

    .submit-btn:active { transform: translateY(0); }

    /* ── Results ── */
    #result {
      display: none;
      margin-top: 48px;
      animation: fadeInUp 0.8s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .result-name {
      font-size: 26px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.15em;
      margin-bottom: 6px;
    }

    .result-info {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
    }

    /* Pillars */
    .pillars-wrap {
      background: linear-gradient(145deg, #0f0f24, #0a0a18);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 16px;
      padding: 36px;
      margin-bottom: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .pillars-title {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: var(--gold);
      text-align: center;
      margin-bottom: 28px;
    }

    .pillars-table {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .pillar {
      text-align: center;
      position: relative;
    }

    .pillar-label {
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-dim);
      margin-bottom: 12px;
      display: block;
    }

    .pillar-cell {
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 10px;
      padding: 18px 10px;
      background: rgba(255,255,255,0.03);
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .pillar-cell::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-dark), transparent);
    }

    .pillar-cell:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-3px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .pillar-hanja {
      font-size: 32px;
      color: var(--gold-light);
      line-height: 1.2;
      display: block;
      margin-bottom: 4px;
    }

    .pillar-korean {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .pillar-element {
      font-size: 10px;
      margin-top: 8px;
      padding: 3px 8px;
      border-radius: 20px;
      display: inline-block;
      letter-spacing: 0.1em;
    }

    .elem-목 { background: rgba(76,180,76,0.15); color: #7ecf7e; border: 1px solid rgba(76,180,76,0.3); }
    .elem-화 { background: rgba(201,76,76,0.15); color: #cf7e7e; border: 1px solid rgba(201,76,76,0.3); }
    .elem-토 { background: rgba(180,150,76,0.15); color: #cfb47e; border: 1px solid rgba(180,150,76,0.3); }
    .elem-금 { background: rgba(201,168,76,0.15); color: var(--gold-light); border: 1px solid rgba(201,168,76,0.3); }
    .elem-수 { background: rgba(76,122,201,0.15); color: #7ea3cf; border: 1px solid rgba(76,122,201,0.3); }

    .pillar-gap { margin-top: 10px; }

    .pillar-branch-hanja {
      font-size: 32px;
      color: var(--text);
      display: block;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    .pillar-animal {
      font-size: 11px;
      color: var(--text-dim);
    }

    /* 오행 chart */
    .ohaeng-wrap {
      background: linear-gradient(145deg, #0f0f24, #0a0a18);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 11px;
      letter-spacing: 0.35em;
      color: var(--gold);
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, rgba(201,168,76,0.3), transparent);
    }

    .ohaeng-bars {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .ohaeng-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .ohaeng-label {
      width: 28px;
      font-size: 13px;
      text-align: center;
    }

    .ohaeng-bar-bg {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
    }

    .ohaeng-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bar-목 { background: linear-gradient(to right, #2d6e2d, #7ecf7e); }
    .bar-화 { background: linear-gradient(to right, #6e2d2d, #cf7e7e); }
    .bar-토 { background: linear-gradient(to right, #6e5a2d, #cfb47e); }
    .bar-금 { background: linear-gradient(to right, #6e5a1a, #e8c97e); }
    .bar-수 { background: linear-gradient(to right, #2d466e, #7ea3cf); }

    .ohaeng-count {
      font-size: 12px;
      color: var(--text-dim);
      width: 20px;
      text-align: right;
    }

    /* Fortune cards */
    .fortune-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .fortune-card {
      background: linear-gradient(145deg, #0f0f24, #0a0a18);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 14px;
      padding: 24px;
      transition: all 0.3s;
    }

    .fortune-card:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-3px);
      box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    }

    .fortune-card.full { grid-column: 1 / -1; }

    .fortune-card-icon {
      font-size: 22px;
      margin-bottom: 12px;
      display: block;
    }

    .fortune-card-title {
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .fortune-card-content {
      font-size: 13.5px;
      line-height: 2;
      color: var(--text);
      word-break: keep-all;
    }

    .stars-rating {
      display: flex;
      gap: 3px;
      margin-bottom: 10px;
    }

    .star { color: var(--gold-dark); font-size: 14px; }
    .star.on { color: var(--gold-light); }

    /* 용신 badge */
    .yongsin-wrap {
      background: linear-gradient(145deg, #0f0f24, #0a0a18);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      text-align: center;
    }

    .yongsin-badges {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .badge {
      padding: 10px 22px;
      border-radius: 30px;
      font-size: 13px;
      letter-spacing: 0.15em;
      border: 1px solid;
    }

    .badge-primary {
      background: rgba(201,168,76,0.15);
      color: var(--gold-light);
      border-color: var(--gold-dark);
      font-weight: 600;
    }

    .badge-secondary {
      background: rgba(255,255,255,0.04);
      color: var(--text-dim);
      border-color: rgba(255,255,255,0.1);
    }

    /* lucky info */
    .lucky-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .lucky-item {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }

    .lucky-item-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      margin-bottom: 8px;
      display: block;
    }

    .lucky-item-value {
      font-size: 16px;
      color: var(--gold-light);
    }

    /* footer */
    .result-footer {
      text-align: center;
      margin-top: 48px;
      padding-top: 32px;
      border-top: 1px solid rgba(201,168,76,0.1);
    }

    .result-footer p {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.2em;
      line-height: 2;
    }

    .retry-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 36px;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 30px;
      color: var(--gold);
      font-family: 'Noto Serif KR', serif;
      font-size: 12px;
      letter-spacing: 0.25em;
      cursor: pointer;
      background: transparent;
      transition: all 0.3s;
    }

    .retry-btn:hover {
      background: rgba(201,168,76,0.1);
      border-color: var(--gold);
    }

    @media (max-width: 600px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full { grid-column: 1; }
      .fortune-grid { grid-template-columns: 1fr; }
      .fortune-card.full { grid-column: 1; }
      .lucky-grid { grid-template-columns: 1fr 1fr; }
      .form-card { padding: 28px 20px; }
      .pillars-wrap { padding: 24px 16px; }
      .pillars-table { gap: 8px; }
      .pillar-hanja, .pillar-branch-hanja { font-size: 24px; }
    }
  </style>
</head>
<body>
  <canvas id="stars-canvas"></canvas>

  <div class="container">
    <!-- Hero -->
    <div class="hero">
      <div class="hero-emblem">☯</div>
      <div class="hero-sub">四柱命理院</div>
      <h1 class="hero-title">SAJU MYUNGRI</h1>
      <p class="hero-desc">
        하늘의 별자리와 시간의 흐름 속에 새겨진<br>
        당신만의 운명을 해석합니다
      </p>
    </div>

    <div class="divider"><span class="divider-icon">✦</span></div>

    <!-- Form -->
    <div class="form-card" id="form-section">
      <div class="form-title">✦ &nbsp; 생년월일시 입력 &nbsp; ✦</div>
      <form id="saju-form">
        <div class="form-grid">
          <div class="form-group full">
            <label>이름</label>
            <input type="text" id="name" placeholder="이름을 입력하세요" required />
          </div>
          <div class="form-group">
            <label>태어난 날</label>
            <input type="date" id="birthdate" required />
          </div>
          <div class="form-group">
            <label>태어난 시간</label>
            <select id="birthtime">
              <option value="-1">모름</option>
              <option value="0">子時 (23:00~01:00)</option>
              <option value="1">丑時 (01:00~03:00)</option>
              <option value="2">寅時 (03:00~05:00)</option>
              <option value="3">卯時 (05:00~07:00)</option>
              <option value="4">辰時 (07:00~09:00)</option>
              <option value="5">巳時 (09:00~11:00)</option>
              <option value="6">午時 (11:00~13:00)</option>
              <option value="7">未時 (13:00~15:00)</option>
              <option value="8">申時 (15:00~17:00)</option>
              <option value="9">酉時 (17:00~19:00)</option>
              <option value="10">戌時 (19:00~21:00)</option>
              <option value="11">亥時 (21:00~23:00)</option>
            </select>
          </div>
          <div class="form-group full">
            <label>성별</label>
            <div class="gender-group">
              <button type="button" class="gender-btn active" data-gender="남">☯ 남성</button>
              <button type="button" class="gender-btn" data-gender="여">☯ 여성</button>
            </div>
          </div>
        </div>
        <button type="submit" class="submit-btn">✦ &nbsp; 사주 풀이 &nbsp; ✦</button>
      </form>
    </div>

    <!-- Result -->
    <div id="result"></div>
  </div>

  <script>
    // ──────────────────────────────────────────────
    // Stars
    // ──────────────────────────────────────────────
    (function () {
      const canvas = document.getElementById('stars-canvas');
      const ctx = canvas.getContext('2d');
      let stars = [];

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }

      function initStars() {
        stars = [];
        const count = Math.floor((canvas.width * canvas.height) / 4000);
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            r: Math.random() * 1.2 + 0.2,
            alpha: Math.random(),
            speed: Math.random() * 0.005 + 0.002,
            phase: Math.random() * Math.PI * 2,
          });
        }
      }

      function draw(t) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        stars.forEach(s => {
          s.alpha = 0.2 + 0.6 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(232, 201, 126, ${s.alpha})`;
          ctx.fill();
        });
        requestAnimationFrame(draw);
      }

      resize();
      initStars();
      window.addEventListener('resize', () => { resize(); initStars(); });
      requestAnimationFrame(draw);
    })();

    // ──────────────────────────────────────────────
    // Saju Data
    // ──────────────────────────────────────────────
    const STEMS = ['갑','을','병','정','무','기','경','신','임','계'];
    const STEMS_H = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
    const BRANCHES = ['자','축','인','묘','진','사','오','미','신','유','술','해'];
    const BRANCHES_H = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const ANIMALS = ['쥐','소','호랑이','토끼','용','뱀','말','양','원숭이','닭','개','돼지'];
    const STEM_ELEM = ['목','목','화','화','토','토','금','금','수','수'];
    const BRANCH_ELEM = ['수','토','목','목','토','화','화','토','금','금','토','수'];
    const STEM_YY = ['양','음','양','음','양','음','양','음','양','음'];

    // 연주 (Year Pillar)
    function yearPillar(year) {
      const s = ((year - 4) % 10 + 10) % 10;
      const b = ((year - 4) % 12 + 12) % 12;
      return { s, b };
    }

    // 월주 (Month Pillar) — 절기 근사치 사용
    // 월지: 인(2)월부터 시작
    function monthPillar(year, month, day) {
      // 절기 기준 월지 계산 (근사)
      const juki = [
        { mo: 1,  d: 6,  branch: 1  }, // 소한 → 축월
        { mo: 2,  d: 4,  branch: 2  }, // 입춘 → 인월
        { mo: 3,  d: 6,  branch: 3  }, // 경칩 → 묘월
        { mo: 4,  d: 5,  branch: 4  }, // 청명 → 진월
        { mo: 5,  d: 6,  branch: 5  }, // 입하 → 사월
        { mo: 6,  d: 6,  branch: 6  }, // 망종 → 오월
        { mo: 7,  d: 7,  branch: 7  }, // 소서 → 미월
        { mo: 8,  d: 8,  branch: 8  }, // 입추 → 신월
        { mo: 9,  d: 8,  branch: 9  }, // 백로 → 유월
        { mo: 10, d: 8,  branch: 10 }, // 한로 → 술월
        { mo: 11, d: 7,  branch: 11 }, // 입동 → 해월
        { mo: 12, d: 7,  branch: 0  }, // 대설 → 자월
      ];

      let branch = 11; // 해월 기본 (12월 초)
      const date = month * 100 + day;
      for (let i = juki.length - 1; i >= 0; i--) {
        const jd = juki[i].mo * 100 + juki[i].d;
        if (date >= jd) { branch = juki[i].branch; break; }
      }
      if (date < 106) branch = 0; // 1월 6일 이전 → 자월

      // 월간: 연간 기준
      const yearStem = ((year - 4) % 10 + 10) % 10;
      const baseStems = [0, 2, 4, 6, 8]; // 갑기, 을경, 병신, 정임, 무계 기준 인월간
      const groupIndex = yearStem % 5;
      // 인월(2)부터 기준 → branch 2가 인월
      const monthOffset = ((branch - 2) + 12) % 12;
      const s = (baseStems[groupIndex] + monthOffset) % 10;

      return { s, b: branch };
    }

    // 일주 (Day Pillar)
    // 기준: 1900년 1월 1일 = 甲子(0) → 2000년 1월 1일 = 戊申(44)
    function dayPillar(year, month, day) {
      const ref = new Date(2000, 0, 1);
      const target = new Date(year, month - 1, day);
      const diff = Math.round((target - ref) / 86400000);
      const idx = ((diff + 44) % 60 + 60) % 60;
      return { s: idx % 10, b: idx % 12 };
    }

    // 시주 (Hour Pillar)
    function hourPillar(dayStem, hourBranch) {
      const bases = [0, 2, 4, 6, 8];
      const s = (bases[dayStem % 5] + hourBranch) % 10;
      return { s, b: hourBranch };
    }

    // 오행 카운트
    function countElements(pillars) {
      const count = { 목: 0, 화: 0, 토: 0, 금: 0, 수: 0 };
      pillars.forEach(p => {
        count[STEM_ELEM[p.s]]++;
        count[BRANCH_ELEM[p.b]]++;
      });
      return count;
    }

    // 용신 (가장 적은 오행을 보완하는 것을 추천)
    function getYongsin(count) {
      const sorted = Object.entries(count).sort((a, b) => a[1] - b[1]);
      return { primary: sorted[0][0], secondary: sorted[1][0] };
    }

    // 운세 해석 (일간 기준)
    function getFortuneText(dayStem, gender, elemCount) {
      const elem = STEM_ELEM[dayStem];
      const yy = STEM_YY[dayStem];
      const name = STEMS[dayStem] + '일주';

      const charMap = {
        '목': { char: '창의적이고 생명력이 넘치며, 시작과 성장을 상징합니다. 봄의 새싹처럼 끊임없이 새로운 것을 추구하며 포용력이 깊습니다.', wealth: '꾸준히 노력하면 안정적인 재물이 쌓입니다. 투자보다는 성실한 직업 활동이 재물의 근원입니다.', love: '감성이 풍부하고 배려심이 강해 이성에게 매력적입니다. 단, 우유부단함이 관계를 어렵게 만들 수 있습니다.', health: '간·담 기능에 주의하세요. 규칙적인 수면과 녹색 채소 섭취가 도움이 됩니다.' },
        '화': { char: '열정적이고 카리스마가 넘치며, 표현력이 탁월합니다. 밝고 활동적이어서 주변에 활기를 불어넣는 타입입니다.', wealth: '순간적인 기회 포착 능력이 뛰어나 재물 운이 강합니다. 단, 충동적 소비를 경계해야 합니다.', love: '열정적이고 직접적인 연애를 즐깁니다. 처음엔 강렬하나 지속성을 유지하는 노력이 필요합니다.', health: '심장·소장에 주의하세요. 과도한 흥분을 자제하고 명상으로 마음을 안정시키세요.' },
        '토': { char: '신뢰할 수 있고 안정적이며, 중재 능력이 뛰어납니다. 묵묵히 자신의 자리를 지키며 주변을 든든하게 지탱합니다.', wealth: '부동산이나 장기 투자가 유리합니다. 신중한 판단력으로 착실하게 재물을 모읍니다.', love: '성실하고 헌신적인 연애를 합니다. 변화를 두려워하는 경향이 있어 새로운 만남을 먼저 시도하는 용기가 필요합니다.', health: '비위(소화기)에 신경 쓰세요. 과식을 삼가고 규칙적인 식사 습관을 기르세요.' },
        '금': { char: '의리 있고 결단력이 강하며, 완벽주의적 성향이 있습니다. 강인한 정신력으로 어떤 어려움도 돌파하는 힘이 있습니다.', wealth: '금속·IT·금융 분야에서 두각을 나타냅니다. 냉철한 판단으로 재물 운이 탄탄합니다.', love: '높은 기준으로 인해 인연을 만나기까지 시간이 걸립니다. 한번 인연이 되면 깊고 오랜 관계를 맺습니다.', health: '폐·대장 기능에 주의하세요. 호흡 운동과 충분한 수분 섭취를 권장합니다.' },
        '수': { char: '지혜롭고 직관력이 뛰어나며, 깊은 사고력을 지닙니다. 어떤 환경에도 유연하게 적응하는 능력이 탁월합니다.', wealth: '아이디어와 정보를 활용한 재물 획득이 유리합니다. 학문·교육·유통 분야에서 재능을 발휘합니다.', love: '감성이 섬세하고 이해력이 깊어 교감이 잘 됩니다. 단, 지나친 감수성으로 오해가 생길 수 있습니다.', health: '신장·방광에 주의하세요. 수분 조절과 적절한 휴식이 중요합니다.' },
      };

      return charMap[elem];
    }

    function getLuckyInfo(pillars) {
      const dayBranch = pillars[2].b;
      const colors = ['흑색·청색', '적색·주황', '황색·갈색', '백색·금색', '흑색·남색'];
      const dirs = ['동쪽', '남쪽', '중앙', '서쪽', '북쪽'];
      const seasons = ['봄', '여름', '환절기', '가을', '겨울'];
      const elemIdx = ['수','목','화','토','금'].indexOf(BRANCH_ELEM[dayBranch]);
      return {
        color: colors[elemIdx] || '금색',
        direction: dirs[elemIdx] || '동쪽',
        season: seasons[elemIdx] || '봄',
        number: (dayBranch % 9) + 1,
      };
    }

    function starsHTML(n) {
      return Array.from({ length: 5 }, (_, i) =>
        `<span class="star ${i < n ? 'on' : ''}">★</span>`
      ).join('');
    }

    // ──────────────────────────────────────────────
    // Render Result
    // ──────────────────────────────────────────────
    function render(name, year, month, day, hourBranch, gender) {
      const yr = yearPillar(year);
      const mo = monthPillar(year, month, day);
      const da = dayPillar(year, month, day);
      const hr = hourBranch >= 0 ? hourPillar(da.s, hourBranch) : null;

      const pillars = [yr, mo, da];
      if (hr) pillars.push(hr);

      const labels = ['년주 (年柱)', '월주 (月柱)', '일주 (日柱)', '시주 (時柱)'];

      const elemCount = countElements(pillars);
      const { primary: yongsinPrimary, secondary: yongsinSecondary } = getYongsin(elemCount);
      const fortune = getFortuneText(da.s, gender, elemCount);
      const lucky = getLuckyInfo(pillars);

      const maxElem = Math.max(...Object.values(elemCount));
      const totalElem = Object.values(elemCount).reduce((a, b) => a + b, 0);

      const pillarsHTML = [yr, mo, da, ...(hr ? [hr] : [])].map((p, i) => `
        <div class="pillar">
          <span class="pillar-label">${labels[i]}</span>
          <div class="pillar-cell">
            <span class="pillar-hanja">${STEMS_H[p.s]}</span>
            <div class="pillar-korean">${STEMS[p.s]} (${STEM_YY[p.s]})</div>
            <span class="pillar-element elem-${STEM_ELEM[p.s]}">${STEM_ELEM[p.s]}</span>
          </div>
          <div class="pillar-cell pillar-gap">
            <span class="pillar-branch-hanja">${BRANCHES_H[p.b]}</span>
            <div class="pillar-animal">${ANIMALS[p.b]}</div>
            <span class="pillar-element elem-${BRANCH_ELEM[p.b]}">${BRANCH_ELEM[p.b]}</span>
          </div>
        </div>
      `).join('');

      const ohaengOrder = ['목','화','토','금','수'];
      const ohaengColors = ['목','화','토','금','수'];
      const ohaengBars = ohaengOrder.map(e => `
        <div class="ohaeng-row">
          <span class="ohaeng-label">${e}</span>
          <div class="ohaeng-bar-bg">
            <div class="ohaeng-bar-fill bar-${e}" style="width:${(elemCount[e]/totalElem*100).toFixed(0)}%"></div>
          </div>
          <span class="ohaeng-count">${elemCount[e]}</span>
        </div>
      `).join('');

      const birthStr = `${year}년 ${month}월 ${day}일${hr ? ' ' + BRANCHES[hr.b] + '시' : ''}`;
      const animalYear = ANIMALS[yr.b];

      const html = `
        <div class="result-header">
          <div class="result-name">${name} ${gender === '남' ? '님' : '님'}</div>
          <div class="result-info">${birthStr} · ${animalYear}띠 · ${gender}성 · ${STEMS[da.s]}${BRANCHES[da.b]} 일주</div>
        </div>

        <div class="pillars-wrap">
          <div class="pillars-title">✦ &nbsp; 사주팔자 &nbsp; ✦</div>
          <div class="pillars-table">${pillarsHTML}</div>
        </div>

        <div class="ohaeng-wrap">
          <div class="section-title">오행 분포</div>
          <div class="ohaeng-bars">${ohaengBars}</div>
        </div>

        <div class="yongsin-wrap">
          <div class="section-title" style="justify-content:center;margin-bottom:6px;">용신 &amp; 희신</div>
          <p style="font-size:12px;color:var(--text-dim);letter-spacing:0.15em;">부족한 기운을 보완해 주는 핵심 에너지</p>
          <div class="yongsin-badges">
            <span class="badge badge-primary">용신 · ${yongsinPrimary}</span>
            <span class="badge badge-secondary">희신 · ${yongsinSecondary}</span>
          </div>
        </div>

        <div class="fortune-grid">
          <div class="fortune-card full">
            <span class="fortune-card-icon">🌙</span>
            <div class="fortune-card-title">✦ 성격과 기질</div>
            <p class="fortune-card-content">${fortune.char}</p>
          </div>
          <div class="fortune-card">
            <span class="fortune-card-icon">💰</span>
            <div class="fortune-card-title">✦ 재물운</div>
            <div class="stars-rating">${starsHTML(3 + (da.s % 3 > 0 ? 1 : 0))}</div>
            <p class="fortune-card-content">${fortune.wealth}</p>
          </div>
          <div class="fortune-card">
            <span class="fortune-card-icon">💫</span>
            <div class="fortune-card-title">✦ 연애운</div>
            <div class="stars-rating">${starsHTML(2 + (da.b % 4))}</div>
            <p class="fortune-card-content">${fortune.love}</p>
          </div>
          <div class="fortune-card full">
            <span class="fortune-card-icon">🌿</span>
            <div class="fortune-card-title">✦ 건강운</div>
            <p class="fortune-card-content">${fortune.health}</p>
          </div>
        </div>

        <div class="ohaeng-wrap">
          <div class="section-title">행운의 기운</div>
          <div class="lucky-grid">
            <div class="lucky-item">
              <span class="lucky-item-label">행운의 색</span>
              <span class="lucky-item-value" style="font-size:13px;">${lucky.color}</span>
            </div>
            <div class="lucky-item">
              <span class="lucky-item-label">행운의 방향</span>
              <span class="lucky-item-value">${lucky.direction}</span>
            </div>
            <div class="lucky-item">
              <span class="lucky-item-label">행운의 숫자</span>
              <span class="lucky-item-value">${lucky.number}</span>
            </div>
          </div>
        </div>

        <div class="result-footer">
          <p>본 사주풀이는 전통 명리학을 기반으로 한 참고용입니다.<br>
          인생의 주인공은 언제나 당신 자신입니다.</p>
          <button class="retry-btn" onclick="resetForm()">✦ &nbsp; 다시 보기 &nbsp; ✦</button>
        </div>
      `;

      const resultEl = document.getElementById('result');
      resultEl.innerHTML = html;
      resultEl.style.display = 'block';
      resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });

      // Animate bars
      setTimeout(() => {
        document.querySelectorAll('.ohaeng-bar-fill').forEach(el => {
          const w = el.style.width;
          el.style.width = '0';
          requestAnimationFrame(() => { el.style.width = w; });
        });
      }, 100);
    }

    // ──────────────────────────────────────────────
    // Form Logic
    // ──────────────────────────────────────────────
    let selectedGender = '남';

    document.querySelectorAll('.gender-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.gender-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedGender = btn.dataset.gender;
      });
    });

    document.getElementById('saju-form').addEventListener('submit', e => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const dateVal = document.getElementById('birthdate').value;
      const hourBranch = parseInt(document.getElementById('birthtime').value);

      if (!name || !dateVal) return;

      const [year, month, day] = dateVal.split('-').map(Number);
      document.getElementById('form-section').style.opacity = '0.5';
      render(name, year, month, day, hourBranch, selectedGender);
    });

    function resetForm() {
      document.getElementById('result').style.display = 'none';
      document.getElementById('form-section').style.opacity = '1';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  </script>
</body>
</html>
